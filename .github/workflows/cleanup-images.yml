---
name: Cleanup Old Container Images

on:
  schedule:
    - cron: "0 3 * * 0" # Weekly on Sunday at 03:00 UTC
  workflow_dispatch:

jobs:
  cleanup-untagged:
    name: Cleanup Untagged Images
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    strategy:
      matrix:
        package: [rate-ukma/backend, rate-ukma/webapp]
    steps:
      - name: Delete untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 0
          delete-only-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-old-tagged:
    name: Cleanup Old Tagged Images
    needs: cleanup-untagged
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    strategy:
      matrix:
        package: [backend, webapp]
    steps:
      - name: Delete tagged versions older than 14 days
        uses: snok/container-retention-policy@v3
        with:
          account: rate-ukma
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: ${{ matrix.package }}
          cut-off: 14 days ago UTC
          keep-at-least: 5
