---
name: Cleanup Old Container Images

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (list deletion candidates, do not delete)"
        type: boolean
        default: true

jobs:
  cleanup-images:
    name: Cleanup Images
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    strategy:
      matrix:
        package: [rate-ukma/backend, rate-ukma/webapp]
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    steps:
      - name: Delete all untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GHCR_PAT }}
          owner: ukma-cs-ssdm-2025
          repository: rate-ukma
          packages: "${{ matrix.package }}"
          delete-untagged: true
          dry-run: ${{ env.DRY_RUN }}

      - name: Prune old commit-SHA tagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GHCR_PAT }}
          owner: ukma-cs-ssdm-2025
          repository: rate-ukma
          packages: "${{ matrix.package }}"
          delete-tags: "[0-9a-f]{40}"
          exclude-tags: latest
          older-than: 14 days
          dry-run: ${{ env.DRY_RUN }}
